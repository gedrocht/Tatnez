repository:
  name: tatnez-rumble-speaker
  description: Windows-first C++ Xbox 360 controller rumble synthesizer with beginner-friendly docs and rigorous CI.
  homepage: https://gedrocht.github.io/Tatnez/
  has_issues: true
  has_projects: false
  has_wiki: false
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true

labels:
  - name: bug
    color: d73a4a
    description: Something is not working as expected
  - name: documentation
    color: 0075ca
    description: Improvements or additions to documentation
  - name: security
    color: b60205
    description: Security-related work
  - name: testing
    color: 1d76db
    description: Test-only changes
