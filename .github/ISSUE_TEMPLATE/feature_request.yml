name: Feature request
description: Propose an enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and alternatives
      description: Include operational, security, and maintenance tradeoffs.
