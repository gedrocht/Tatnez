name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repository hygiene dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-format shellcheck

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  build-and-test-linux:
    name: Build and Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++ ninja-build

      - name: Configure CMake
        run: cmake -S . -B build/linux -G Ninja -DTATNEZ_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/linux

      - name: Run tests
        run: ctest --test-dir build/linux --output-on-failure

  build-and-test-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build/windows -DTATNEZ_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/windows --config Debug

      - name: Run tests
        run: ctest --test-dir build/windows -C Debug --output-on-failure

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang clang-tidy cppcheck ninja-build

      - name: Configure CMake with clang-tidy
        run: >
          cmake -S . -B build/static-analysis -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DTATNEZ_BUILD_TESTS=ON
          -DTATNEZ_ENABLE_CLANG_TIDY=ON

      - name: Build with clang-tidy
        run: cmake --build build/static-analysis

      - name: Run cppcheck
        run: >
          cppcheck
          --enable=warning,style,performance,portability
          --error-exitcode=1
          --inline-suppr
          --suppress=missingIncludeSystem
          --file-filter=${{ github.workspace }}/src/*
          --file-filter=${{ github.workspace }}/include/*
          --project=build/static-analysis/compile_commands.json

      - name: Lint GitHub Actions
        uses: raven-actions/actionlint@v2

  sanitizers:
    name: Sanitizers
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install sanitizer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang ninja-build

      - name: Configure sanitizer build
        run: >
          cmake -S . -B build/sanitizers -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DTATNEZ_BUILD_TESTS=ON
          -DTATNEZ_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build/sanitizers

      - name: Run tests
        run: ctest --test-dir build/sanitizers --output-on-failure

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++ ninja-build
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Configure coverage build
        run: >
          cmake -S . -B build/coverage -G Ninja
          -DTATNEZ_BUILD_TESTS=ON
          -DTATNEZ_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build/coverage

      - name: Run tests
        run: ctest --test-dir build/coverage --output-on-failure

      - name: Generate coverage report
        run: >
          gcovr
          --root .
          --exclude 'tests/'
          --exclude 'build/'
          --print-summary
          --xml-pretty
          --output build/coverage.xml
          --fail-under-line 85
          --fail-under-branch 70

      - name: Generate coverage HTML
        run: >
          gcovr
          --root .
          --exclude 'tests/'
          --exclude 'build/'
          --html-details
          --output build/coverage/index.html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage
